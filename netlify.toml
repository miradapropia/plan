[build]
  publish = "."
  functions = "netlify/functions"

# default headers — applied to everything
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=(), camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # csp ACTIVA. construida desde el inventario real de recursos.
    # pdf.js corre con isEvalSupported:false (mitiga CVE-2024-4367 y evita eval),
    # por eso NO hace falta 'unsafe-eval'. 'wasm-unsafe-eval' permite compilar
    # webassembly (posibles decodificadores de imagen de pdf.js) SIN habilitar
    # eval de js, así que no reabre el agujero de xss.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; frame-src https://open.spotify.com https://www.youtube-nocookie.com https://www.youtube.com https://w.soundcloud.com; connect-src 'self' https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

# index.html — never aggressive cache (so updates ship fast)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# / (root) — same as index.html
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# sitemap and robots — short cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain"

# favicon and og image — long cache
[[headers]]
  for = "/favicon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ambient mode video and poster — 30 days cache (versioned filenames recommended)
[[headers]]
  for = "/ambient/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
    Access-Control-Allow-Origin = "*"
